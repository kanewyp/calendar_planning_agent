# =============================================================================
# .github/workflows/ci.yml — GitHub Actions CI pipeline
# =============================================================================
# Runs the no-credentials programmatic test suite on every push and PR.
#
# tests/pipeline_unit/ and tests/llm_integration/ require Google ADC and
# call the real Vertex AI API. They are dev-time verification only and run
# locally — see docs/EXPERIMENTAL_SETUP.md. Wiring them into CI requires
# a GCP service account or workload identity federation; not yet set up.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-tests:
    name: Programmatic tests (mocked, no credentials)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run programmatic test suite
        env:
          CALENDAR_MODE: mock
          LLM_PROVIDER: mock
        run: pytest -q tests/programmatic/
